<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style></style>
    <title>Simple JS Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/css/fonts.css" />
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>
  <body class="press-start-2p-regular">
    <div class="calendar-container">
      <div class="calendar-header">
        <h2 id="monthTitle">Month Year</h2>
        <div>
          <button id="prevMonth" class="buttons">&lt;</button>
          <button id="nextMonth" class="buttons">&gt;</button>
        </div>
      </div>

      <div class="calendar-body">
        <div class="grid">
          <div class="day-name">Sun</div>
          <div class="day-name">Mon</div>
          <div class="day-name">Tue</div>
          <div class="day-name">Wed</div>
          <div class="day-name">Thu</div>
          <div class="day-name">Fri</div>
          <div class="day-name">Sat</div>
        </div>

        <div id="calendarDays" class="grid" style="padding-top: 0"></div>
      </div>
    </div>
  </body>
  <script src="./src/main.ts"></script>
</html>
